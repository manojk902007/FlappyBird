<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Main game wrapper -->
     <div id="game-wrapper">
        <!-- The actual game canvas area -->
         <canvas id="gameCanvas"></canvas>
         <!-- Start screen shown before game begins -->
          <div id="startScreen" class="overlay">
            <h1>Flappy Bird</h1>
            <p class="subtitle">how hard can it be?</p>
            <button id="startBtn" onclick="startGame()">Play</button>
            <p class="hint">Space / tap to flap</p>
          </div>
          <!-- Game over screen -->
           <div id="gameOverScreen" class="overlay hidden">
            <h1>Game Over</h1>
            <p id="finalScore">Score: 0</p>
            <p id="bestScore">Best: 0</p>
            <button id="restartBtn" onclick="restartGame()">Try Again</button>
           </div>
     </div>
     <script src="script.js"></script>
</body>
</html>
